<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Script Planner — Табличный формат</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #fcfbfe;
        --dot: rgba(208, 193, 226, 0.65);
        --surface: #ffffff;
        --ink: #26212e;
        --muted: #6f6480;
        --pink: #d7318f;
        --pink-soft: #ffe8f5;
        --line: #e5dbef;
        --blue: #2c62da;
        --blue-soft: #e6eeff;
        --green: #1a7a44;
        --green-soft: #e2f8e8;
        --red: #c63030;
        --red-soft: #ffe3e3;
        --v1-bg: #f5f6f8;
        --v2-bg: #fff2e5;
        --v3-bg: #fff0f8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Manrope", "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--bg);
        background-image: radial-gradient(var(--dot) 1px, transparent 1px);
        background-size: 18px 18px;
      }

      .app {
        max-width: 1560px;
        margin: 0 auto;
        padding: 20px 18px 40px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 14px;
        margin-bottom: 12px;
      }

      .title {
        margin: 0;
        color: var(--pink);
        font-size: clamp(1.4rem, 2.2vw, 2rem);
        font-weight: 800;
      }

      .subtitle {
        margin: 7px 0 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
        background: color-mix(in srgb, var(--surface) 92%, #fff6fb 8%);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 11px;
        margin-bottom: 14px;
      }

      .search {
        width: 100%;
        border: 1px solid #d9cdea;
        border-radius: 10px;
        padding: 9px 11px;
        font: inherit;
      }

      .btn {
        border: 1px solid #ddb7d0;
        background: linear-gradient(140deg, #ffe7f4, #ffd9ec);
        border-radius: 10px;
        padding: 9px 12px;
        font: inherit;
        font-weight: 700;
        color: #74174b;
        cursor: pointer;
      }

      .hint {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .series-block {
        margin-bottom: 18px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--surface);
        overflow: hidden;
      }

      .series-head {
        padding: 12px 14px;
        background: color-mix(in srgb, var(--pink-soft) 55%, #fff 45%);
        border-bottom: 1px solid var(--line);
      }

      .series-title {
        margin: 0;
        color: var(--pink);
        font-size: 1.06rem;
        font-weight: 800;
      }

      .series-theme {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .table-wrap {
        overflow: auto;
      }

      table {
        width: 100%;
        min-width: 1180px;
        border-collapse: collapse;
      }

      th,
      td {
        vertical-align: top;
        border-bottom: 1px solid var(--line);
        border-right: 1px solid var(--line);
        padding: 10px;
      }

      th:last-child,
      td:last-child {
        border-right: 0;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      th {
        text-align: left;
        font-size: 0.83rem;
        color: #635576;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        background: #fbf8ff;
      }

      .col-question {
        width: 23%;
      }

      .col-v1,
      .col-v2,
      .col-v3 {
        width: 25.66%;
      }

      .question-title {
        margin: 0;
        color: #92245f;
        font-size: 0.98rem;
        font-weight: 800;
        line-height: 1.35;
      }

      .speaker-note {
        margin: 8px 0 0;
        padding: 8px;
        border: 1px dashed #e2d3ef;
        border-radius: 10px;
        background: #fcf8ff;
        font-size: 0.82rem;
        color: #6f6182;
        line-height: 1.35;
      }

      .meta-block {
        margin-top: 8px;
        padding: 8px;
        border: 1px solid #eadff3;
        border-radius: 10px;
        background: #fff;
      }

      .meta-title {
        margin: 0;
        font-size: 0.78rem;
        color: #7c6493;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .meta-list {
        margin: 7px 0 0;
        padding-left: 16px;
        font-size: 0.84rem;
        color: #50445f;
      }

      .track-block {
        margin-bottom: 10px;
        border: 1px solid #e7ddf0;
        border-radius: 10px;
        padding: 8px;
        background: #fff;
      }

      .track-block:last-child {
        margin-bottom: 0;
      }

      .track-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .track-badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 0.74rem;
        font-weight: 800;
      }

      .speaker-chip {
        border: 1px solid #dccdeb;
        border-radius: 999px;
        padding: 3px 7px;
        font-size: 0.73rem;
        color: #6f6084;
        background: #faf6ff;
        white-space: nowrap;
      }

      .badge-blue {
        color: var(--blue);
        background: var(--blue-soft);
      }

      .badge-green {
        color: var(--green);
        background: var(--green-soft);
      }

      .badge-red {
        color: var(--red);
        background: var(--red-soft);
      }

      .v1-cell {
        background: var(--v1-bg);
      }

      .v2-cell {
        background: var(--v2-bg);
      }

      .v3-cell {
        background: var(--v3-bg);
      }

      .variant-list {
        margin: 8px 0 0;
        padding-left: 18px;
        display: grid;
        gap: 5px;
        font-size: 0.86rem;
        line-height: 1.35;
      }

      .variant-long {
        margin: 8px 0 0;
        font-size: 0.86rem;
        line-height: 1.4;
      }

      .copy-btn {
        margin-top: 8px;
        border: 1px solid #d5c7e5;
        border-radius: 8px;
        background: #fff;
        padding: 6px 9px;
        font: inherit;
        font-size: 0.8rem;
        font-weight: 700;
        cursor: pointer;
      }

      .empty {
        border: 1px dashed #e5c5d8;
        border-radius: 10px;
        padding: 12px;
        background: #fff5fb;
        color: #824a68;
      }

      @media (max-width: 900px) {
        .controls {
          grid-template-columns: 1fr;
        }
      }

      @media print {
        @page {
          size: A4 landscape;
          margin: 10mm;
        }

        body {
          background: #fff;
        }

        .app {
          max-width: none;
          padding: 0;
        }

        .controls,
        .copy-btn {
          display: none !important;
        }

        .series-block,
        .track-block,
        tr,
        td {
          break-inside: avoid;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div>
          <h1 class="title" id="projectTitle">Script Planner — Табличный формат</h1>
          <p class="subtitle">Серия → Вопрос → Ответы V1 / V2 / V3 (по трекам-спикерам)</p>
        </div>
      </header>

      <section class="controls">
        <input id="searchInput" class="search" type="search" placeholder="Поиск по вопросам и ответам" />
        <button id="printBtn" class="btn" type="button">Печать / PDF</button>
      </section>

      <p class="hint" id="resultHint">Показаны все вопросы.</p>

      <main id="seriesContainer"></main>
    </div>

    <script id="embeddedData" type="application/json">{"projectTitle":"Партнёрская магистратура — табличный сценарный план","legend":{"science":{"label":"Научный трек","color":"blue"},"expert":{"label":"Экспертный трек","color":"green"},"management":{"label":"Управленческий трек","color":"red"}},"variants":[{"id":"v1","label":"V1 — Оригинал (коротко)","type":"short"},{"id":"v2","label":"V2 — Разговорно (10–15 сек)","type":"short"},{"id":"v3","label":"V3 — Полный ответ (15–30 сек)","type":"long"}],"series":[{"id":"s1","title":"Серия 1. Точка входа","theme":"Почему магистратура важна и что она изменила","questions":[{"id":"s1q1","title":"Вопрос 1. Почему ты выбрал(а) партнёрскую магистратуру компании?","tracks":{"science":{"v1_short":["Мне важно было не просто учиться, а заниматься реальными исследованиями.","Я искал среду, где теория сразу проверяется практикой.","Мне хотелось писать статьи и понимать, что это не формальность и теория, а реальный вклад.","Я хотел узнать, как создаются новые технологии и из каких кирпичиков складывается современная наука."],"v2_short":["Мне было важно не просто ходить на пары, а делать настоящие исследования.","Искал место, где теорию можно сразу проверить в деле.","Хотел писать статьи и видеть, что от этого есть реальная польза.","Плюс хотелось понять, как на практике рождаются новые технологии."],"v3_long":"На старте я понял, что формат «просто учёбы» мне уже тесный. Хотел не пересказывать чужие выводы, а самому формулировать гипотезы и проверять их в реальной работе. В этой магистратуре меня зацепило, что теория сразу сталкивается с практикой, а результаты можно довести до публикации и реального применения. Именно это и стало решающим фактором выбора."},"expert":{"v1_short":["Я хотел работать с сильными специалистами уже во время обучения.","Мне важно было погружение в реальные технологические задачи.","Я искал место для реального роста, а не комфорт."],"v2_short":["Хотел учиться рядом с сильными специалистами — так растёшь быстрее.","Для меня было важно решать реальные задачи, а не учебные кейсы.","Искал среду роста, даже если там не всегда удобно."],"v3_long":"Я уже тогда понимал, что быстрее всего растёшь рядом с сильной командой. Мне нужен был не теоретический комфорт, а рабочая среда с настоящими ограничениями, дедлайнами и ответственностью за результат. Магистратура дала именно это: учишься и сразу применяешь знания на реальных задачах. Из-за этого прогресс стал ощутимо быстрее."},"management":{"v1_short":["Я хотел понимать, как устроен продукт и процессы изнутри.","Мне было важно учиться там, где есть масштаб.","Я видел в этом возможность быстрее выйти на уровень ответственности."],"v2_short":["Хотел разобраться, как продукт и процессы работают изнутри.","Мне был важен масштаб и то, как на нём принимают решения.","Видел в этом шанс быстрее дойти до реальной ответственности."],"v3_long":"Мне всегда было важно видеть не только свою задачу, а всю систему целиком: продукт, процессы, связи между командами. В магистратуре я увидел возможность попасть ближе к уровню, где формируются решения, и понять, как работает масштаб. Для меня это был путь к осознанной ответственности, а не просто к новой позиции в резюме."}}},{"id":"s1q2","title":"Вопрос 2. Что стало главным открытием во время магистратуры?","tracks":{"science":{"v1_short":["Что исследование — это системная работа, а не вдохновение.","Качественная научная публикация — это результат дисциплины.","Что наука — это командная интеллектуальная работа."],"v2_short":["Главное открытие: наука — это система, а не вдохновение по настроению.","Хорошая публикация держится на дисциплине и правках.","И ещё: без команды в исследовании далеко не уедешь."],"v3_long":"Для меня главным открытием стало то, что исследование редко выглядит как озарение. В реальности это длинная системная работа: проверка гипотез, ошибки, правки и повторные расчёты. Плюс всё сильно завязано на команду, потому что качество рождается в обсуждении и взаимной проверке. После этого начинаешь иначе относиться и к науке, и к себе в процессе."},"expert":{"v1_short":["Что глубина решает больше, чем скорость.","Что надо проявляться, даже если страшно.","Что ошибки — это часть поиска решения."],"v2_short":["Понял, что в сложных задачах выигрывает глубина, а не спешка.","Нужно проявляться: спрашивать, спорить, предлагать.","Ошибки — нормальная часть пути к рабочему решению."],"v3_long":"Раньше я делал ставку на скорость, но в магистратуре стало ясно: в сложных задачах важнее докопаться до причины. Ещё было важное открытие, что нужно проявляться, даже когда не уверен на сто процентов. И ошибки перестали пугать, потому что без них невозможно дойти до сильного решения. Это сильно перестроило мой рабочий подход."},"management":{"v1_short":["Что технологии — это люди, которые их создают.","А процессы так же важны, как идеи.","И ответственность начинается раньше, чем должность."],"v2_short":["Я увидел, что за любой технологией в итоге стоят люди.","Даже сильная идея не работает без нормального процесса.","И ответственность начинается раньше, чем новая должность."],"v3_long":"Для меня самым сильным инсайтом стало, что технология — это прежде всего взаимодействие людей. Идея может быть отличной, но без процесса она разваливается в реализации. Плюс я почувствовал, что ответственность появляется раньше формального статуса: в тот момент, когда твои решения влияют на сроки, качество и команду. После этого я начал мыслить как управленец."}}},{"id":"s1q3","title":"Вопрос 3. Когда ты понял(а), что хочешь остаться и расти в компании?","tracks":{"science":{"v1_short":["Когда увидел, что могу довести исследование до результата.","Когда мою работу начали цитировать внутри команды.","Когда понял, что здесь есть пространство для научного роста."],"v2_short":["Щёлкнуло, когда я довёл первое исследование до результата.","Потом на мои выводы начали ссылаться в рабочих обсуждениях.","Тогда понял, что здесь реально можно расти как исследователь."],"v3_long":"Переломный момент случился, когда я довёл первую сложную работу до внятного результата. До этого было много сомнений, но в финале появился вывод, который можно защищать. А когда на мои материалы начали опираться внутри команды, я понял: это не формальность, здесь есть реальное поле для научного роста. Тогда и принял решение оставаться."},"expert":{"v1_short":["Когда сложная задача перестала казаться невозможной.","Когда почувствовал азарт от технического вызова.","Когда понял, что хочу стать точкой экспертизы."],"v2_short":["Сначала задача казалась неподъёмной, а потом начала раскладываться по шагам.","Когда получилось, поймал азарт от сложных технических вызовов.","Тогда и решил расти в сторону сильной экспертизы."],"v3_long":"Был момент, когда я реально не понимал, как подступиться к задаче. Но шаг за шагом удалось разобраться, и страх сменился азартом. После этого стало ясно, что мне хочется идти в глубину и брать всё более сложные технические решения. Так я осознанно выбрал экспертный трек внутри компании."},"management":{"v1_short":["Когда мне доверили координацию небольшой задачи.","Когда понял, что могу влиять на общий результат.","Когда увидел, как решение меняет работу команды."],"v2_short":["Мне дали координировать небольшой кусок работы, и я втянулся.","Я увидел, что мои решения напрямую влияют на результат.","Когда команда стала работать ровнее, понял: это мой путь."],"v3_long":"Первый сигнал был тогда, когда мне доверили координацию небольшой задачи. Я почувствовал, что могу влиять не только на свой кусок, а на общий темп и качество работы команды. Когда один из наших подходов реально улучшил процесс, стало окончательно понятно: мне интересно развиваться здесь именно как управленцу."}}}],"finalBlock":{"vertical_v1":["Я думал, что магистратура — это наука и знания.","Я думал, что это шаг в карьеру.","Я думал, что просто попробую."],"horizontal_v3":"Мы начинали с одной точки входа, но довольно быстро стало ясно: дальше у каждого свой вектор. Один путь к глубине исследований, другой — к экспертизе, третий — к управлению системой. Именно этот выбор и стал главным поворотом серии."}},{"id":"s2","title":"Серия 2. Мой вектор","theme":"Момент осознания карьерной стратегии","questions":[{"id":"s2q1","title":"Вопрос 1. Когда ты понял(а), какой путь тебе ближе?","tracks":{"science":{"v1_short":["Когда начал писать первую серьёзную статью.","Когда понял, что мне могу внести свой вклад в науку.","Когда почувствовал интерес к наставничеству младших."],"v2_short":["Когда сел за первую серьёзную статью, понял: это моё.","Появилось ощущение, что могу дать науке свой реальный вклад.","И неожиданно понравилось помогать младшим разбираться в теме."],"v3_long":"Поворот случился во время первой серьёзной статьи: я поймал интерес не к «сдать работу», а к настоящему исследовательскому процессу. В этот момент появилось чувство собственного вклада в науку, пусть и небольшого. А когда я начал помогать младшим, стало ясно, что мне близок путь, где сочетаются глубина и наставничество."},"expert":{"v1_short":["Когда сложная задача захватила меня полностью.","Когда начал глубже остальных копать в детали.","Когда понял, что хочу быть тем, к кому идут за ответом."],"v2_short":["Одна сложная задача так зацепила, что я не мог её отпустить.","Я начал копать глубже, чем от меня вообще требовали.","Когда ко мне пошли с вопросами, понял: мой путь — экспертиза."],"v3_long":"Я понял свой вектор на задаче, которая сначала казалась просто тяжёлой, а потом стала по-настоящему интересной. Начал разбирать её глубже стандарта и увидел, что ко мне тянутся за разъяснением. В этот момент стало ясно: мне ближе роль эксперта, который держит сложность и помогает другим принимать сильные решения."},"management":{"v1_short":["Когда начал видеть взаимосвязи между командами.","Когда стал инициировать решения, а не ждать задач.","Когда понял, что мне важнее общий результат, чем личный вклад."],"v2_short":["Я начал видеть, где команды тормозят друг друга на стыках.","Стал сам предлагать решения, а не ждать постановки сверху.","В какой-то момент общий результат стал важнее личной победы."],"v3_long":"Мой вектор проявился, когда я начал замечать не только свои задачи, но и связи между командами. Я всё чаще предлагал решения сам, потому что видел, где ломается процесс. А когда приоритетом стал общий результат, а не личный вклад, стало понятно: управленческий путь мне действительно близок."}}},{"id":"s2q2","title":"Вопрос 2. Почему именно этот вектор?","tracks":{"science":{"v1_short":["Мне важно создавать знания, а не только применять их.","Мне нравится растить других через исследования.","Я выбираю долгую интеллектуальную дистанцию."],"v2_short":["Мне важно не только применять знания, но и создавать новые.","Мне нравится, когда через исследования растут другие люди.","Я нормально отношусь к длинной дистанции — люблю глубину."],"v3_long":"Я выбрал научный вектор, потому что мне важно делать вклад в новое знание, а не только использовать готовые подходы. Меня не пугает длинная дистанция и сложный путь к результату. Плюс мне близко развивать других через исследовательскую культуру — это даёт очень сильный внутренний смысл работе."},"expert":{"v1_short":["Мне важно быть сильным профессионалом.","Я люблю сложность и нестандартные решения.","Я хочу влиять через компетенцию."],"v2_short":["Мне важно быть человеком, который реально отвечает за качество.","Люблю сложные задачи, где нет готового шаблона.","И хочу влиять знаниями и решением, а не статусом."],"v3_long":"Экспертный путь мне близок, потому что в нём ценится качество мышления и точность решений. Я люблю задачи, где нужно разбираться глубоко, а не просто быстро закрывать тикет. Для меня это и есть честная форма влияния: когда тебя слышат за компетенцию, а не за должность."},"management":{"v1_short":["Мне важно масштабировать результат.","Я хочу формировать направления.","Я выбираю влияние через команду."],"v2_short":["Мне важен масштаб: чтобы результат работал не для одного человека.","Мне интересно задавать направление и собирать вокруг него людей.","Поэтому я выбираю влияние через команду и систему."],"v3_long":"Я выбираю управленческий трек, потому что мне важен масштаб результата. Интересно не просто сделать самому, а выстроить контекст, в котором команда стабильно даёт сильный выход. Когда система начинает работать лучше и люди растут, это для меня самый понятный маркер правильного пути."}}}],"finalBlock":{"vertical_v1":["Теперь это мой путь.","И дальше всё зависит от того, как я с ним справлюсь.","Посмотрим."],"horizontal_v3":"Во второй серии каждый фиксирует свой вектор уже как личное решение. Без пафоса: выбор сделан, но дальше начинается настоящая проверка — выдержишь ли ты собственную планку."}},{"id":"s3","title":"Серия 3. Первая проверка","theme":"Как выбранный путь проверяет характер","questions":[{"id":"s3q1","title":"Вопрос 1. Когда ты впервые почувствовал(а), что можешь не справиться?","tracks":{"science":{"v1_short":["Когда исследование зашло в тупик.","Когда данные не сходились.","Когда понял, что могу потратить месяцы впустую."],"v2_short":["Первый жёсткий момент — когда исследование просто упёрлось в стену.","Данные расходились, и я не понимал, куда двигаться дальше.","Тогда впервые подумал, что могу потерять месяцы зря."],"v3_long":"Самый тяжёлый момент был, когда исследование встало, а цифры перестали складываться в цельную картину. Возникло ощущение, что я просто трачу время и двигаюсь в пустоту. В этот период особенно остро почувствовал риск не справиться, но именно он заставил собраться и продолжить работу системно."},"expert":{"v1_short":["Когда решение не выдержало разбор.","Когда в моем проекте нашли слабое место.","Когда понял, что не всё продумал."],"v2_short":["Сильно накрыло, когда моё решение развалили на разборе.","В проекте быстро нашли слабое место, которое я пропустил.","В тот момент стало ясно: часть вещей я недодумал."],"v3_long":"Первый удар пришёл на разборе, когда решение, в которое я верил, не прошло проверку. Нашли уязвимое место, и стало очевидно, что я не довёл мысль до конца. Это был неприятный, но очень полезный момент: он показал реальный уровень требований и включил более взрослый подход к качеству."},"management":{"v1_short":["Когда команда ждала моего решения, а у меня его не было.","Когда нужно было выбрать один из двух рисков.","Когда понял, что ошибка затронет других."],"v2_short":["Сложнее всего было, когда команда ждала ответ, а у меня его ещё не было.","Нужно было выбирать не между хорошим и плохим, а между двумя рисками.","И я понимал: если ошибусь, это ударит по людям."],"v3_long":"Для меня первый серьёзный стресс случился в момент, когда команда ждала решения, а ясного ответа не было. Пришлось выбирать между двумя рисками и принимать последствия на себя. Именно тогда я по-настоящему почувствовал, что управленческий путь — это не про контроль, а про ответственность за других."}}},{"id":"s3q2","title":"Вопрос 2. Что в тот момент тебя больше всего выбило?","tracks":{"science":{"v1_short":["Тишина, когда никто не может сказать, правильно ли ты идёшь.","Ощущение одиночества в исследовании.","Сомнение в гипотезе."],"v2_short":["Больше всего выбила тишина, когда никто не может подтвердить, что ты на верном пути.","В какой-то момент появилось чувство одиночества в исследовании.","И очень давило сомнение: гипотеза вообще живая или нет."],"v3_long":"Меня сильнее всего качнула неопределённость: ты работаешь, но никто не может гарантировать, что идёшь верно. В такие моменты появляется очень ощутимое одиночество и недоверие к собственной гипотезе. Это эмоционально тяжело, но именно через такие точки и формируется исследовательская устойчивость."},"expert":{"v1_short":["Публичная критика.","Осознание, что решение неидеально.","Мысль, что можно было лучше."],"v2_short":["Самый болезненный момент — публичная критика моего решения.","Пришлось признать, что решение далеко не идеальное.","И долго не отпускала мысль, что можно было сделать лучше."],"v3_long":"Больше всего выбила именно публичная обратная связь, когда твоё решение разбирают по частям при всех. В этот момент приходится честно признать ограничения своей работы и выдержать внутреннее давление. Но позже понимаешь, что эта точка делает тебя сильнее как специалиста."},"management":{"v1_short":["Ответственность за эмоции команды.","Непопулярное решение.","Понимание, что кому-то это решение не понравится."],"v2_short":["Меня выбила ответственность не только за задачи, но и за состояние команды.","Пришлось принять непопулярное решение, которое было нужно проекту.","И понимать заранее, что часть людей будет этим недовольна."],"v3_long":"Самым тяжёлым стало не само решение, а последствия для людей вокруг. Нужно было принять непопулярный шаг и выдержать эмоциональную реакцию команды. Это тот момент, когда особенно ясно понимаешь: управленец отвечает не только за результат, но и за атмосферу, в которой он достигается."}}},{"id":"s3q3","title":"Вопрос 3. Почему ты всё равно не отступил(а)?","tracks":{"science":{"v1_short":["Потому что иначе исследование никогда не закончится.","Потому что вопрос был слишком важен.","Потому что хотелось довести до результата."],"v2_short":["Потому что если отступить, исследование просто зависнет навсегда.","Вопрос был слишком важен, чтобы бросить его на полпути.","И очень хотелось дойти до честного результата."],"v3_long":"Я не отступил, потому что понял простую вещь: в исследовании тупик — это не конец, а часть маршрута. Для меня сам вопрос был слишком значимым, чтобы бросить его при первом серьёзном сопротивлении. Решил идти до конца и довести работу до результата, который можно защищать."},"expert":{"v1_short":["Потому что это был вызов.","Потому что я знал, что могу лучше.","Потому что хотелось разобраться до конца."],"v2_short":["Потому что это был настоящий профессиональный вызов.","Я понимал, что могу сделать сильнее, чем в первой версии.","И было важно докопаться до причины до самого конца."],"v3_long":"Я остался в задаче, потому что она стала личным вызовом. После первой ошибки появилось сильное желание собрать решение уже на другом уровне качества. В итоге именно этот подход «докопаться до конца» и дал тот рост, который в обычных задачах редко случается."},"management":{"v1_short":["Потому что команда ждала.","Потому что от моего решения зависел результат.","Потому что лидерство — это про ответственность."],"v2_short":["Потому что команда в этот момент реально на тебя опирается.","От решения зависел не только процесс, но и общий результат.","А лидерство, по сути, и есть ответственность в действии."],"v3_long":"Я не отступил, потому что в этот момент нельзя «поставить на паузу» ответственность. Команда ждала ориентир, и от этого решения зависел итог работы. Для меня это стало подтверждением: лидерство — это не статус, а готовность брать на себя сложные последствия."}}}],"finalBlock":{"vertical_v1":["Я правда думал, что ошибся с выбором.","Мне хотелось сделать шаг назад.","Я не был готов к такому давлению."],"horizontal_v3":"Именно в точке сомнения герои получают не меньше, а больше ответственности. Эта серия про проверку характера: выдержать критику, неопределённость и давление, чтобы перейти на следующий уровень."}},{"id":"s4","title":"Серия 4. Первый результат","theme":"Что меняется после доверия и первой ответственности","questions":[{"id":"s4q1","title":"Вопрос 1. Что в тебе изменилось после того, как тебе дали больше ответственности?","tracks":{"science":{"v1_short":["Я стал внимательнее к деталям.","Я начал проверять себя дважды.","Я понял, что мои выводы влияют не только на меня."],"v2_short":["После этого я стал заметно внимательнее к деталям.","Появилась привычка перепроверять себя дважды.","И пришло понимание, что мои выводы влияют на других."],"v3_long":"После первой серьёзной ответственности я перестал относиться к деталям как к мелочам. Появилась внутренняя дисциплина: проверять себя ещё раз, даже когда кажется, что всё уже верно. Потому что стало очевидно: мои выводы влияют не только на меня, но и на решения команды."},"expert":{"v1_short":["Я стал строже к своим решениям.","Я перестал бояться признавать, что чего-то не знаю.","Я начал задавать больше вопросов."],"v2_short":["Я стал заметно строже к качеству собственных решений.","Перестал стесняться честно говорить: этого пока не знаю.","И начал задавать намного больше уточняющих вопросов."],"v3_long":"С ответственностью у меня сильно выросла планка к собственным решениям. Одновременно ушёл страх признать пробелы в знаниях — это, наоборот, ускорило рост. Я стал чаще задавать вопросы и глубже проверять гипотезы, и в итоге качество работы стало стабильнее."},"management":{"v1_short":["Я стал слушать дольше.","Я перестал принимать решения в одиночку.","Я начал думать о последствиях для команды."],"v2_short":["Я стал дольше слушать людей перед решением.","Перестал замыкать всё на себе и выбирать в одиночку.","Теперь в приоритете последствия для команды, а не быстрый ответ."],"v3_long":"Первое, что изменилось во мне как в управленце, — я начал больше слушать и меньше торопиться с выводами. Решения перестали быть «моими личными», они стали командными по качеству и ответственности. Появился фокус на последствия для людей и устойчивость процесса, а не на быстрый эффект."}}},{"id":"s4q2","title":"Вопрос 2. Как ты понял(а), что твоя работа дала реальный результат?","tracks":{"science":{"v1_short":["Когда исследование приняли к публикации.","Когда данные подтвердили гипотезу.","Когда на мою работу начали ссылаться."],"v2_short":["Понял это, когда работу приняли к публикации.","Плюс данные подтвердили гипотезу не на словах, а по факту.","И на выводы начали ссылаться коллеги в рабочих обсуждениях."],"v3_long":"Реальный результат я увидел в трёх точках: публикация, подтверждённые данные и ссылки коллег на мою работу. Это был момент, когда исследование перестало быть «моей учебной задачей» и стало частью общего профессионального контекста. После этого вера в выбранный путь стала гораздо устойчивее."},"expert":{"v1_short":["Когда моё решение внедрили.","Когда архитектура выдержала нагрузку.","Когда к моему подходу вернулись повторно."],"v2_short":["Результат стал очевиден, когда моё решение ушло в прод.","Архитектура выдержала реальную нагрузку без провалов.","А потом к этому подходу вернулись ещё раз — уже как к рабочему стандарту."],"v3_long":"Для меня ключевой маркер результата — это не презентация, а внедрение и стабильная работа в реальных условиях. Когда архитектура выдержала нагрузку и к подходу вернулись повторно, стало понятно, что решение действительно ценное. Это уже не эксперимент, а практическая экспертиза."},"management":{"v1_short":["Когда команда справилась без моего постоянного контроля.","Когда проект дошёл до финала в срок.","Когда люди начали брать инициативу."],"v2_short":["Я понял, что есть результат, когда команда пошла ровно без ручного контроля.","Проект дошёл до финала вовремя и без хаотичных провалов.","И люди сами начали брать инициативу на себя."],"v3_long":"Мой результат проявился тогда, когда команда стала работать устойчиво без постоянного «ручного режима». Проект дошёл до финиша в срок, а люди начали проявлять инициативу самостоятельно. Для управленца это самый честный показатель: система работает и без постоянного давления сверху."}}},{"id":"s4q3","title":"Вопрос 3. Что изменилось после первого результата?","tracks":{"science":{"v1_short":["Я стал смелее в гипотезах.","Начал думать о следующем исследовании.","Появилось ощущение устойчивости."],"v2_short":["После первого результата я стал смелее формулировать гипотезы.","Сразу начал думать о следующем исследовании.","И появилось спокойное ощущение устойчивости в профессии."],"v3_long":"Первый результат дал мне не эйфорию, а внутреннюю опору. Я стал смелее в постановке гипотез и начал смотреть вперёд, а не только закрывать текущий цикл. Появилось ощущение устойчивости: теперь я понимаю, как проходить сложные участки и доводить работу до итога."},"expert":{"v1_short":["Появился азарт брать сложнее.","Я начал видеть систему глубже.","Я стал спокойнее в дискуссиях."],"v2_short":["Появился азарт брать задачи сложнее предыдущих.","Я стал глубже видеть, как устроена система целиком.","И в технических спорах стало больше спокойствия и уверенности."],"v3_long":"После первого сильного результата я перестал бояться сложных вызовов и начал сознательно их искать. Одновременно выросла глубина системного понимания, а в обсуждениях стало меньше эмоций и больше аргументов. Это и есть эффект настоящего профессионального взросления."},"management":{"v1_short":["Я стал больше делегировать.","Я начал мыслить долгосрочно.","Понял, что развитие людей — это тоже результат."],"v2_short":["Я начал больше делегировать и доверять людям роли.","Фокус сместился с срочных задач на долгую траекторию.","И чётко понял: рост команды — это такой же результат, как цифры проекта."],"v3_long":"Первый подтверждённый результат изменил мою управленческую оптику. Я стал больше делегировать, думать на несколько шагов вперёд и иначе оценивать прогресс команды. Теперь для меня результат — это не только закрытый проект, но и то, насколько сильнее стали люди внутри системы."}}}],"finalBlock":{"vertical_v1":["Первый результат — это не про успех.","Это про подтверждение.","Про понимание, что ты на своём месте."],"horizontal_v3":"После первой победы появляется следующий уровень вопроса: если получилось один раз, готов ли ты держать эту планку дальше. Четвёртая серия про переход от единичного успеха к устойчивой профессиональной траектории."}},{"id":"s5","title":"Серия 5. Становление","theme":"Долгий фокус, масштаб и горизонт 3–5 лет","questions":[{"id":"s5q1","title":"Вопрос 1. Что теперь для тебя важнее, чем в начале пути?","tracks":{"science":{"v1_short":["Качество, а не скорость.","Аргумент, а не статус.","Процесс, а не быстрый результат."],"v2_short":["Сейчас для меня важнее качество, чем просто темп.","Сильный аргумент ценнее любого статуса.","И устойчивый процесс важнее разового быстрого эффекта."],"v3_long":"Если сравнить с началом пути, сейчас я гораздо больше ценю качество и доказательность. Для меня сильный аргумент всегда важнее формального статуса, а процесс — важнее разового быстрого результата. Именно такой подход позволяет строить длинную и честную научную траекторию."},"expert":{"v1_short":["Решение, которое выдержит время.","Честность в оценке своих знаний.","Сложность, которая меня растит."],"v2_short":["Теперь я смотрю на решение через вопрос: выдержит ли оно время.","Стало важнее честно понимать свои границы в знаниях.","И выбирать те сложности, которые реально развивают."],"v3_long":"Сейчас для меня ключевой критерий — надёжность решения во времени, а не быстрый эффект. Параллельно выросла ценность честности к себе: признать пробел и закрыть его — это сила, а не слабость. И я осознанно выбираю задачи, которые вытягивают меня на следующий уровень."},"management":{"v1_short":["Устойчивость команды.","Общее направление, а не локальная победа.","Долгий результат."],"v2_short":["На первом месте теперь устойчивость команды, а не разовые рывки.","Важнее общее направление, чем локальная победа в одном эпизоде.","Я всё чаще выбираю долгий результат вместо быстрого эффекта."],"v3_long":"В управленческом треке приоритеты сильно сместились: важнее стабильность команды, чем краткосрочные рекорды. Я стал смотреть на решения через общую траекторию, а не через локальные успехи. В итоге главный ориентир — долгий, устойчивый результат, который можно масштабировать."}}},{"id":"s5q2","title":"Вопрос 2. Что ты хочешь создать через 3–5 лет?","tracks":{"science":{"v1_short":["Сильное научное направление.","Команду исследователей.","Исследования, которые меняют индустрию."],"v2_short":["Через несколько лет хочу выстроить сильное научное направление.","Собрать вокруг себя зрелую команду исследователей.","И делать работы, которые реально двигают индустрию вперёд."],"v3_long":"На горизонте 3–5 лет я вижу себя в роли человека, который развивает полноценное научное направление. Хочу собрать сильную исследовательскую команду и делать работы, которые дают эффект не только внутри компании, но и для индустрии в целом. Это для меня и есть масштаб научной ответственности."},"expert":{"v1_short":["Технологию, которая станет стандартом.","Решения, которые сложно повторить.","Глубину, которую будут уважать."],"v2_short":["Хочу сделать технологию, которая со временем станет стандартом.","Строить решения, которые трудно повторить без глубокой экспертизы.","И выйти на уровень, где уважают именно за глубину."],"v3_long":"В перспективе я хочу создавать технологии, которые станут ориентиром, а не временным решением. Для меня важно делать архитектуру и подходы, которые сложно воспроизвести без серьёзной школы. Итоговая цель — профессиональная глубина, которую признают и внутри команды, и на рынке."},"management":{"v1_short":["Команду, которая растёт быстрее рынка.","Систему, которая работает без хаоса.","Направление, которое задаёт тренд."],"v2_short":["Через 3–5 лет хочу построить команду, которая растёт быстрее рынка.","Выстроить систему, где процессы идут без хаоса и постоянных пожарных режимов.","И развивать направление, которое начинает задавать тренд."],"v3_long":"Моя цель на 3–5 лет — собрать сильную команду и вывести её на темп роста выше рынка. Параллельно хочу закрепить систему, в которой процессы работают устойчиво и предсказуемо. В идеале это должно вырасти в направление, которое уже само задаёт стандарт и тренд."}}}],"finalBlock":{"vertical_v1":["Мы начали одинаково.","Но выбрали разные траектории построения карьеры.","И продолжаем выбирать каждый день."],"horizontal_v3":"Финал истории: один старт, три разные стратегии роста — наука, экспертиза и управление. Магистратура стала точкой входа, а дальше каждый день подтверждает выбор траектории действиями."}}]}</script>

    <script>
      "use strict";

      const TRACKS = ["science", "expert", "management"];
      const SPEAKER_MAP = {
        science: "Спикер 1",
        expert: "Спикер 2",
        management: "Спикер 3",
      };

      const dom = {
        projectTitle: document.getElementById("projectTitle"),
        seriesContainer: document.getElementById("seriesContainer"),
        searchInput: document.getElementById("searchInput"),
        printBtn: document.getElementById("printBtn"),
        resultHint: document.getElementById("resultHint"),
      };

      const state = {
        data: null,
        query: "",
      };

      function asArray(value) {
        return Array.isArray(value) ? value : [];
      }

      function asString(value) {
        if (typeof value === "string") {
          return value;
        }
        if (value === null || value === undefined) {
          return "";
        }
        return String(value);
      }

      function normalizeTrack(track) {
        const src = track && typeof track === "object" ? track : {};
        return {
          v1_short: asArray(src.v1_short).map(asString).filter(Boolean),
          v2_short: asArray(src.v2_short).map(asString).filter(Boolean),
          v3_long: asString(src.v3_long),
        };
      }

      function normalizeQuestion(question, index) {
        const src = question && typeof question === "object" ? question : {};
        const tracks = src.tracks && typeof src.tracks === "object" ? src.tracks : {};
        return {
          id: asString(src.id) || `q-${index + 1}`,
          title: asString(src.title) || `Вопрос ${index + 1}`,
          tracks: {
            science: normalizeTrack(tracks.science),
            expert: normalizeTrack(tracks.expert),
            management: normalizeTrack(tracks.management),
          },
        };
      }

      function normalizeSeries(series, index) {
        const src = series && typeof series === "object" ? series : {};
        return {
          id: asString(src.id) || `s-${index + 1}`,
          title: asString(src.title) || `Серия ${index + 1}`,
          theme: asString(src.theme),
          questions: asArray(src.questions).map((question, qIndex) => normalizeQuestion(question, qIndex)),
        };
      }

      function normalizeLegend(rawLegend) {
        const legend = rawLegend && typeof rawLegend === "object" ? rawLegend : {};
        return {
          science: {
            label: asString(legend.science?.label) || "Научный трек",
            color: asString(legend.science?.color) || "blue",
          },
          expert: {
            label: asString(legend.expert?.label) || "Экспертный трек",
            color: asString(legend.expert?.color) || "green",
          },
          management: {
            label: asString(legend.management?.label) || "Управленческий трек",
            color: asString(legend.management?.color) || "red",
          },
        };
      }

      function normalizeData(rawData) {
        const src = rawData && typeof rawData === "object" ? rawData : {};
        return {
          projectTitle: asString(src.projectTitle) || "Script Planner — Табличный формат",
          legend: normalizeLegend(src.legend),
          series: asArray(src.series).map((series, index) => normalizeSeries(series, index)),
        };
      }

      function normalize(text) {
        return String(text || "").toLowerCase().replace(/\s+/g, " ").trim();
      }

      function getTrackMeta(trackKey) {
        const info = state.data.legend?.[trackKey] || {};
        return {
          label: info.label || trackKey,
          color: info.color || "blue",
          speaker: SPEAKER_MAP[trackKey] || "Спикер",
        };
      }

      function copyButton(text) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "copy-btn";
        button.textContent = "Copy";
        button.addEventListener("click", async () => {
          const original = button.textContent;
          try {
            if (navigator.clipboard?.writeText) {
              await navigator.clipboard.writeText(text);
            } else {
              const area = document.createElement("textarea");
              area.value = text;
              area.style.position = "fixed";
              area.style.opacity = "0";
              document.body.appendChild(area);
              area.select();
              document.execCommand("copy");
              area.remove();
            }
            button.textContent = "Скопировано";
          } catch {
            button.textContent = "Ошибка";
          }

          button.disabled = true;
          setTimeout(() => {
            button.disabled = false;
            button.textContent = original;
          }, 800);
        });
        return button;
      }

      function renderVariantCell(question, variantKey) {
        const cell = document.createElement("td");
        cell.className = `${variantKey}-cell`;

        TRACKS.forEach((trackKey) => {
          const track = question.tracks?.[trackKey];
          if (!track) {
            return;
          }

          const meta = getTrackMeta(trackKey);
          const block = document.createElement("section");
          block.className = "track-block";

          const head = document.createElement("div");
          head.className = "track-head";

          const badge = document.createElement("span");
          badge.className = `track-badge badge-${meta.color}`;
          badge.textContent = meta.label;
          head.appendChild(badge);

          const speaker = document.createElement("span");
          speaker.className = "speaker-chip";
          speaker.textContent = meta.speaker;
          head.appendChild(speaker);

          block.appendChild(head);

          if (variantKey === "v1") {
            const list = document.createElement("ul");
            list.className = "variant-list";
            const items = Array.isArray(track.v1_short) ? track.v1_short : [];
            items.forEach((item) => {
              const li = document.createElement("li");
              li.textContent = item;
              list.appendChild(li);
            });
            block.appendChild(list);
            block.appendChild(copyButton(items.map((line) => `• ${line}`).join("\n")));
          }

          if (variantKey === "v2") {
            const list = document.createElement("ul");
            list.className = "variant-list";
            const items = Array.isArray(track.v2_short) ? track.v2_short : [];
            items.forEach((item) => {
              const li = document.createElement("li");
              li.textContent = item;
              list.appendChild(li);
            });
            block.appendChild(list);
            block.appendChild(copyButton(items.map((line) => `• ${line}`).join("\n")));
          }

          if (variantKey === "v3") {
            const text = document.createElement("p");
            text.className = "variant-long";
            text.textContent = track.v3_long || "";
            block.appendChild(text);
            block.appendChild(copyButton(track.v3_long || ""));
          }

          cell.appendChild(block);
        });

        return cell;
      }

      function renderQuestionCell(question) {
        const cell = document.createElement("td");

        const title = document.createElement("h3");
        title.className = "question-title";
        title.textContent = question.title;
        cell.appendChild(title);

        const speakerNote = document.createElement("p");
        speakerNote.className = "speaker-note";
        speakerNote.textContent = "Логика спикеров: Научный трек = Спикер 1, Экспертный трек = Спикер 2, Управленческий трек = Спикер 3.";
        cell.appendChild(speakerNote);

        const hasKino =
          (Array.isArray(question.brollIdeas) && question.brollIdeas.length > 0) ||
          (question.shotNotes && typeof question.shotNotes === "object") ||
          (Array.isArray(question.keywords) && question.keywords.length > 0);

        if (hasKino) {
          const block = document.createElement("div");
          block.className = "meta-block";

          const head = document.createElement("p");
          head.className = "meta-title";
          head.textContent = "Кинополя";
          block.appendChild(head);

          if (Array.isArray(question.brollIdeas) && question.brollIdeas.length > 0) {
            const list = document.createElement("ul");
            list.className = "meta-list";
            question.brollIdeas.forEach((item) => {
              const li = document.createElement("li");
              li.textContent = item;
              list.appendChild(li);
            });
            block.appendChild(list);
          }

          if (question.shotNotes && typeof question.shotNotes === "object") {
            const list = document.createElement("ul");
            list.className = "meta-list";
            [
              ["Кадр", question.shotNotes.framing],
              ["Пауза", question.shotNotes.pause],
              ["Взгляд", question.shotNotes.eyeContact],
              ["Темп", question.shotNotes.tempo],
            ]
              .filter((entry) => entry[1])
              .forEach(([label, value]) => {
                const li = document.createElement("li");
                li.textContent = `${label}: ${value}`;
                list.appendChild(li);
              });
            block.appendChild(list);
          }

          if (Array.isArray(question.keywords) && question.keywords.length > 0) {
            const list = document.createElement("ul");
            list.className = "meta-list";
            const li = document.createElement("li");
            li.textContent = `Ключевые слова: ${question.keywords.join(", ")}`;
            list.appendChild(li);
            block.appendChild(list);
          }

          cell.appendChild(block);
        }

        return cell;
      }

      function questionTextBlob(question) {
        const chunks = [question.title || ""];

        TRACKS.forEach((trackKey) => {
          const track = question.tracks?.[trackKey];
          if (!track) {
            return;
          }
          chunks.push(...(track.v1_short || []));
          chunks.push(...(track.v2_short || []));
          chunks.push(track.v3_long || "");
        });

        chunks.push(...(question.brollIdeas || []));
        chunks.push(...(question.keywords || []));

        if (question.shotNotes && typeof question.shotNotes === "object") {
          chunks.push(question.shotNotes.framing || "");
          chunks.push(question.shotNotes.pause || "");
          chunks.push(question.shotNotes.eyeContact || "");
          chunks.push(question.shotNotes.tempo || "");
        }

        return normalize(chunks.join(" "));
      }

      function buildFilteredSeries() {
        const q = normalize(state.query);

        return state.data.series
          .map((series) => {
            const questions = series.questions.filter((question) => {
              if (!q) {
                return true;
              }
              return questionTextBlob(question).includes(q);
            });
            return { ...series, questions };
          })
          .filter((series) => series.questions.length > 0);
      }

      function render() {
        const filteredSeries = buildFilteredSeries();
        dom.seriesContainer.innerHTML = "";

        let totalQuestions = 0;
        filteredSeries.forEach((series) => {
          totalQuestions += series.questions.length;

          const wrapper = document.createElement("section");
          wrapper.className = "series-block";

          const head = document.createElement("header");
          head.className = "series-head";

          const title = document.createElement("h2");
          title.className = "series-title";
          title.textContent = series.title.toUpperCase();
          head.appendChild(title);

          const theme = document.createElement("p");
          theme.className = "series-theme";
          theme.textContent = series.theme;
          head.appendChild(theme);

          wrapper.appendChild(head);

          const tableWrap = document.createElement("div");
          tableWrap.className = "table-wrap";

          const table = document.createElement("table");
          const thead = document.createElement("thead");
          const headRow = document.createElement("tr");

          [
            ["col-question", "Вопрос"],
            ["col-v1", "V1 — Оригинал"],
            ["col-v2", "V2 — Естественнее"],
            ["col-v3", "V3 — Полный (горизонталь)"]
          ].forEach(([cls, text]) => {
            const th = document.createElement("th");
            th.className = cls;
            th.textContent = text;
            headRow.appendChild(th);
          });

          thead.appendChild(headRow);
          table.appendChild(thead);

          const tbody = document.createElement("tbody");

          series.questions.forEach((question) => {
            const row = document.createElement("tr");
            row.appendChild(renderQuestionCell(question));
            row.appendChild(renderVariantCell(question, "v1"));
            row.appendChild(renderVariantCell(question, "v2"));
            row.appendChild(renderVariantCell(question, "v3"));
            tbody.appendChild(row);
          });

          table.appendChild(tbody);
          tableWrap.appendChild(table);
          wrapper.appendChild(tableWrap);
          dom.seriesContainer.appendChild(wrapper);
        });

        if (filteredSeries.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "По этому запросу ничего не найдено.";
          dom.seriesContainer.appendChild(empty);
        }

        if (!state.query.trim()) {
          dom.resultHint.textContent = `Показаны все вопросы. Всего: ${totalQuestions}.`;
        } else {
          dom.resultHint.textContent = `Поиск «${state.query.trim()}»: найдено вопросов ${totalQuestions}.`;
        }
      }

      function readEmbeddedData() {
        const node = document.getElementById("embeddedData");
        if (!node) {
          return null;
        }

        try {
          const raw = (node.textContent || "").trim();
          return raw ? JSON.parse(raw) : null;
        } catch (error) {
          console.warn("Embedded JSON parse error:", error);
          return null;
        }
      }

      async function loadData() {
        const embedded = readEmbeddedData();

        try {
          const response = await fetch("data.json", { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`Не удалось загрузить data.json (${response.status})`);
          }
          const payload = await response.json();
          return normalizeData(payload);
        } catch (error) {
          if (embedded) {
            console.warn("Fetch data.json failed, using embedded data:", error);
            return normalizeData(embedded);
          }
          throw error;
        }
      }

      function bindControls() {
        dom.searchInput.addEventListener("input", (event) => {
          state.query = event.target.value;
          render();
        });

        dom.printBtn.addEventListener("click", () => {
          window.print();
        });
      }

      async function bootstrap() {
        bindControls();

        try {
          state.data = await loadData();
          dom.projectTitle.textContent = state.data.projectTitle || "Script Planner — Табличный формат";
          render();
        } catch (error) {
          console.error(error);
          dom.seriesContainer.innerHTML = "";
          const empty = document.createElement("div");
          empty.className = "empty";
          const details = error instanceof Error ? error.message : String(error);
          empty.textContent = `Ошибка загрузки данных: ${details}`;
          dom.seriesContainer.appendChild(empty);
        }
      }

      bootstrap();
    </script>
  </body>
</html>
